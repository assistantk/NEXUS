<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaTrade AI | Intelligent Markets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              background: 'rgb(var(--bg-main) / <alpha-value>)', 
              surface: 'rgb(var(--bg-surface) / <alpha-value>)', 
              border: 'rgb(var(--border-color) / <alpha-value>)',
              primary: '#6366f1', // Indigo 500
              accent: '#0ea5e9', // Sky 500
              success: '#10b981', // Emerald 500
              danger: '#ef4444', // Red 500
            }
          }
        }
      }
    </script>
    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #94a3b8; 
        border-radius: 10px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #334155; 
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b; 
      }
      
      :root {
        --bg-main: 248 250 252; /* Slate 50 */
        --bg-surface: 255 255 255; /* White */
        --border-color: 226 232 240; /* Slate 200 */
        --text-main: 15 23 42; /* Slate 900 */
      }
      
      .dark {
        --bg-main: 11 14 20; /* #0B0E14 */
        --bg-surface: 21 25 33; /* #151921 */
        --border-color: 30 41 59; /* Slate 800 */
        --text-main: 248 250 252; /* Slate 50 */
      }

      body {
        background-color: rgb(var(--bg-main));
        color: rgb(var(--text-main));
        transition: background-color 0.3s, color 0.3s;
      }
      
      .glass-panel {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 0, 0, 0.05);
      }
      
      .dark .glass-panel {
        background: rgba(21, 25, 33, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "recharts": "https://esm.sh/recharts@^3.6.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
